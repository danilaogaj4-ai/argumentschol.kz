<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора | TheArgument</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8F6FC;
            --primary-color: #6E3CBC;
            --primary-hover: #542A98;
            --accent-color: #8F5CFF;
            --text-main: #1F1135;
            --text-muted: #64557A;
            --border-color: rgba(110, 60, 188, 0.15);
            --card-shadow: 0 10px 30px rgba(110, 60, 188, 0.05);
            --color-green: #4CAF50;
            --color-red: #E53E3E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 38px; width: auto; }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .logo-text span { color: var(--primary-color); }

        h1 { font-size: 1.8rem; font-weight: 700; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-outline {
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--primary-color);
        }
        .btn-outline:hover { background-color: rgba(110, 60, 188, 0.05); }

        .btn-danger { background-color: var(--color-red); color: white; }
        .btn-danger:hover { opacity: 0.9; }

        .btn-excel {
            background: linear-gradient(135deg, #1a6c3a, #217346);
            color: white;
            box-shadow: 0 4px 15px rgba(33, 115, 70, 0.3);
        }
        .btn-excel:hover {
            background: linear-gradient(135deg, #217346, #1a6c3a);
            box-shadow: 0 6px 20px rgba(33, 115, 70, 0.45);
            transform: translateY(-1px);
        }

        .data-source-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            vertical-align: middle;
        }
        .source-local {
            background: rgba(255,152,0,0.12);
            color: #e65100;
            border: 1px solid rgba(255,152,0,0.3);
        }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }

        .card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filters-group { display: flex; gap: 12px; flex-wrap: wrap; }

        select {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            outline: none;
            font-family: inherit;
            color: var(--text-muted);
            cursor: pointer;
        }
        select:focus { border-color: var(--primary-color); }

        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }

        th {
            background-color: rgba(110, 60, 188, 0.05);
            padding: 16px;
            font-weight: 700;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(110, 60, 188, 0.08);
            vertical-align: middle;
        }

        tr:hover { background-color: rgba(110, 60, 188, 0.02); }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-bought {
            background-color: rgba(76, 175, 80, 0.12);
            color: var(--color-green);
            border: 1px solid rgba(76, 175, 80, 0.25);
        }
        .status-unbought {
            background-color: rgba(229, 62, 62, 0.12);
            color: var(--color-red);
            border: 1px solid rgba(229, 62, 62, 0.25);
        }

        .slot-tag {
            display: inline-block;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 100px;
            margin: 2px;
            font-weight: 600;
        }

        .lectures-list { font-size: 0.75rem; color: var(--text-muted); padding-left: 14px; }

        .actions-cell { display: flex; gap: 6px; }

        .action-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.1s ease;
        }
        .action-btn-green { background-color: var(--color-green); color: white; }
        .action-btn-red { background-color: var(--color-red); color: white; }
        .action-btn:hover { opacity: 0.9; }

        .empty-row-msg { text-align: center; color: var(--text-muted); padding: 40px; font-style: italic; }

        .stats-summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }
        .summary-card h4 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .summary-card p { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="TheArgument" class="logo-img">
                <div class="logo-text">The<span>Argument</span> | Админка</div>
            </div>
            <div>
                <a href="index.html" class="btn btn-outline">← На главную</a>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-summary-cards">
            <div class="summary-card">
                <h4>Всего заявок</h4>
                <p id="totalRegistrations">0</p>
            </div>
            <div class="summary-card">
                <h4>Куплено курсов</h4>
                <p id="boughtCourses">0</p>
            </div>
            <div class="summary-card">
                <h4>Языки: ENG / RUS</h4>
                <p id="langStats">0 / 0</p>
            </div>
            <div class="summary-card">
                <h4>Формат: Инд. / Груп.</h4>
                <p id="formatStats">0 / 0</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h2>
                        Список заявок
                        <span class="data-source-badge source-local" id="dataSourceBadge">💾 Локально</span>
                    </h2>
                    <div class="filters-group">
                        <select id="filterLevel">
                            <option value="All">Все уровни</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Pro">Pro</option>
                        </select>
                        <select id="filterFormat">
                            <option value="All">Все форматы</option>
                            <option value="Индивидуально">Индивидуально</option>
                            <option value="Группа">Групповые</option>
                        </select>
                        <button class="btn btn-outline" id="refreshBtn">🔄 Обновить</button>
                        <button class="btn btn-excel" id="exportExcelBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            Скачать CSV
                        </button>
                        <button class="btn btn-danger" id="clearBtn">⚠️ Очистить всё</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="regTable">
                        <thead>
                            <tr>
                                <th>Имя и Фамилия</th>
                                <th>Телефон</th>
                                <th>Уровень</th>
                                <th>Формат</th>
                                <th>Язык</th>
                                <th>Лекции Pro</th>
                                <th>Удобное время</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="9" class="empty-row-msg">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var tableBody        = document.getElementById('tableBody');
            var refreshBtn       = document.getElementById('refreshBtn');
            var clearBtn         = document.getElementById('clearBtn');
            var filterLevel      = document.getElementById('filterLevel');
            var filterFormat     = document.getElementById('filterFormat');
            var totalEl          = document.getElementById('totalRegistrations');
            var boughtEl         = document.getElementById('boughtCourses');
            var langEl           = document.getElementById('langStats');
            var formatEl         = document.getElementById('formatStats');
            var allRegistrations = [];

            // ── Загрузка из localStorage ─────────────────────────────────────
            function fetchRegistrations() {
                var regs  = JSON.parse(localStorage.getItem('registrations') || '[]');
                var users = JSON.parse(localStorage.getItem('users') || '{}');

                allRegistrations = regs.map(function(reg) {
                    var u = users[reg.phoneNumber];
                    return Object.assign({}, reg, {
                        status: (u && u.status) || reg.status || 'Не куплен'
                    });
                });

                if (allRegistrations.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="9" class="empty-row-msg">Заявок пока нет. Попросите кого-нибудь заполнить форму на главной странице.</td></tr>';
                    totalEl.textContent  = 0;
                    boughtEl.textContent = 0;
                    langEl.textContent   = '0 / 0';
                    formatEl.textContent = '0 / 0';
                    return;
                }
                renderTable();
            }

            // ── Статистика ───────────────────────────────────────────────────
            function updateStats(data) {
                var b = 0, en = 0, ru = 0, ind = 0, grp = 0;
                data.forEach(function(r) {
                    if (r.status === 'Куплен') b++;
                    if (r.language === 'Английский') en++;
                    else if (r.language === 'Русский') ru++;
                    if (r.format === 'Индивидуально' || r.format === 'Индивидуальные') ind++;
                    else if (r.format === 'Группа' || r.format === 'Групповые') grp++;
                });
                totalEl.textContent  = data.length;
                boughtEl.textContent = b;
                langEl.textContent   = en + ' / ' + ru;
                formatEl.textContent = ind + ' / ' + grp;
            }

            // ── Фильтрация ───────────────────────────────────────────────────
            function renderTable() {
                var lv = filterLevel.value;
                var fm = filterFormat.value;
                var filtered = allRegistrations.filter(function(r) {
                    return (lv === 'All' || r.courseLevel === lv) &&
                           (fm === 'All' || r.format === fm);
                });
                updateStats(filtered);
                renderRows(filtered);
            }

            // ── Строки таблицы ───────────────────────────────────────────────
            function renderRows(data) {
                tableBody.innerHTML = '';
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="9" class="empty-row-msg">Заявки не найдены</td></tr>';
                    return;
                }
                data.forEach(function(reg) {
                    var tr = document.createElement('tr');

                    var slotsHtml = (reg.slots || []).map(function(s) {
                        return '<span class="slot-tag">' + s + '</span>';
                    }).join(' ');

                    var lecturesHtml = '-';
                    if (reg.courseLevel === 'Pro' && reg.selectedLectures && reg.selectedLectures.length > 0) {
                        lecturesHtml = '<ol class="lectures-list">' +
                            reg.selectedLectures.map(function(t) { return '<li>' + t + '</li>'; }).join('') +
                            '</ol>';
                    }

                    var isBought    = reg.status === 'Куплен';
                    var statusClass = isBought ? 'status-bought' : 'status-unbought';

                    var ph = (reg.phoneNumber || '').replace(/'/g, '');
                    var fn = (reg.firstName   || '').replace(/'/g, '');
                    var ln = (reg.lastName    || '').replace(/'/g, '');

                    var actionBtn = isBought
                        ? '<button class="action-btn action-btn-red" onclick="toggleStatus(\'' + ph + '\',\'Не куплен\',\'' + fn + '\',\'' + ln + '\')">Отменить покупку</button>'
                        : '<button class="action-btn action-btn-green" onclick="toggleStatus(\'' + ph + '\',\'Куплен\',\'' + fn + '\',\'' + ln + '\')">Активировать курс</button>';

                    tr.innerHTML =
                        '<td><strong>' + (reg.firstName||'') + ' ' + (reg.lastName||'') + '</strong></td>' +
                        '<td>' + (reg.phoneNumber||'') + '</td>' +
                        '<td><span class="slot-tag">' + (reg.courseLevel||'') + '</span></td>' +
                        '<td>' + (reg.format||'') + '</td>' +
                        '<td>' + (reg.language||'') + '</td>' +
                        '<td>' + lecturesHtml + '</td>' +
                        '<td>' + slotsHtml + '</td>' +
                        '<td><span class="status-badge ' + statusClass + '">' + (reg.status||'Не куплен') + '</span></td>' +
                        '<td class="actions-cell">' + actionBtn + '</td>';

                    tableBody.appendChild(tr);
                });
            }

            // ── Смена статуса ────────────────────────────────────────────────
            window.toggleStatus = function(phone, newStatus, firstName, lastName) {
                var users = JSON.parse(localStorage.getItem('users') || '{}');
                users[phone] = {
                    firstName:  firstName,
                    lastName:   lastName,
                    status:     newStatus,
                    updatedAt:  new Date().toISOString()
                };
                localStorage.setItem('users', JSON.stringify(users));
                fetchRegistrations();
            };

            // ── Экспорт CSV (без интернета, открывается в Excel) ─────────────
            document.getElementById('exportExcelBtn').addEventListener('click', function() {
                if (allRegistrations.length === 0) {
                    alert('Нет данных для экспорта!');
                    return;
                }
                function q(v) { return '"' + (v || '').toString().replace(/"/g, '""') + '"'; }

                var headers = ['Имя','Фамилия','Телефон','Уровень','Формат','Язык','Лекции (Pro)','Удобное время','Статус','Дата заявки'];
                var lines   = [headers.map(q).join(',')];

                allRegistrations.forEach(function(r) {
                    lines.push([
                        r.firstName,
                        r.lastName,
                        r.phoneNumber,
                        r.courseLevel,
                        r.format,
                        r.language,
                        (r.selectedLectures || []).join('; '),
                        (r.slots || []).join(' | '),
                        r.status || 'Не куплен',
                        r.timestamp ? new Date(r.timestamp).toLocaleString('ru-RU') : ''
                    ].map(q).join(','));
                });

                var csv  = '\uFEFF' + lines.join('\r\n');  // BOM для кириллицы в Excel
                var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                var url  = URL.createObjectURL(blob);
                var a    = document.createElement('a');
                a.href     = url;
                a.download = 'TheArgument_Заявки_' + new Date().toLocaleDateString('ru-RU').replace(/\./g, '-') + '.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // ── Обновить ─────────────────────────────────────────────────────
            refreshBtn.addEventListener('click', fetchRegistrations);
            filterLevel.addEventListener('change', renderTable);
            filterFormat.addEventListener('change', renderTable);

            // ── Очистить всё ─────────────────────────────────────────────────
            clearBtn.addEventListener('click', function() {
                if (confirm('Удалить ВСЕ заявки? Действие нельзя отменить.')) {
                    localStorage.removeItem('registrations');
                    localStorage.removeItem('users');
                    fetchRegistrations();
                }
            });

            // Загрузка при открытии
            fetchRegistrations();
        });
    </script>
</body>
</html>
